apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: harbor-srv01.mylab021.com/ik8s-go-ms-proxy/gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: GATEWAY_SERVICE_PORT
              value: "80"
            - name: USER_SERVICE_PORT
              value: "8080"
            - name: ORDER_SERVICE_PORT
              value: "8080"
            - name: PRODUCT_SERVICE_PORT
              value: "8080"
            - name: USER_SERVICE_BACKEND_HOST
              value: "user-service"
            - name: USER_SERVICE_BACKEND_PORT
              value: "8080"
            - name: ORDER_SERVICE_BACKEND_HOST
              value: "order-service"
            - name: ORDER_SERVICE_BACKEND_PORT
              value: "8080"
            - name: PRODUCT_SERVICE_BACKEND_HOST
              value: "product-service"
            - name: PRODUCT_SERVICE_BACKEND_PORT
              value: "8080"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.podIP
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: spec.nodeName
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  apiVersion: v1
                  fieldPath: status.hostIP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: gateway
